document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>Select every square that contains a <strong>cookie<\u002Fstrong>.<\u002Fp>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;\">\n                <sc-for list=\"{{ capTiles }}\" as=\"tile\" hint-placeholder-count=\"9\">\n                  <div sc-camel-on-click=\"{{ tile.onClick }}\" style=\"{{ tile.style }}\">\n                    <sc-if value=\"{{ tile.cookie }}\">\n                      <div style=\"width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 34% 32%,#4a3420 0 3px,transparent 4px),radial-gradient(circle at 64% 50%,#4a3420 0 2.5px,transparent 3.5px),radial-gradient(circle at 42% 66%,#4a3420 0 3px,transparent 4px),radial-gradient(circle at 70% 72%,#4a3420 0 2px,transparent 3px),radial-gradient(circle at 30% 30%,#e7c39a,#cf9f6f);\"><\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <button sc-camel-on-click=\"{{ capVerify }}\" style=\"width:100%;padding:13px;border:none;border-radius:11px;background:#2563eb;color:#fff;font-weight:700;font-size:14px;cursor:pointer;\">Verify<\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ step4 }}\">\n              <div style=\"font-weight:800;font-size:18px;color:#111;\">Approval required<\u002Fdiv>\n              <p style=\"font-size:13.5px;color:#6b7280;line-height:1.55;margin:10px 0 20px;\">Your request to reject cookies has been escalated to your <strong>manager<\u002Fstrong> for review. Please wait for approval.<\u002Fp>\n              <button sc-camel-on-click=\"{{ approve }}\" style=\"width:100%;padding:15px;border:none;border-radius:11px;background:#1d1d1f;color:#fff;font-weight:800;font-size:15px;cursor:pointer;\">Approve (I am the manager)<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ LINER ============ -->\n  <sc-if value=\"{{ isLiner }}\">\n    <div style=\"position:absolute;inset:0;background:var(--paper,#F3F7F5);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;\">\n      <div style=\"max-width:620px;\">\n        <div style=\"font-family:'Poppins',sans-serif;font-size:12px;letter-spacing:.22em;font-weight:600;color:var(--accent,#119C8B);text-transform:uppercase;margin-bottom:8px;\">Reality check<\u002Fdiv>\n        <div style=\"font-size:13px;color:#9aa6a2;margin-bottom:24px;\">{{ patternName }} · {{ tier }}<\u002Fdiv>\n        <p style=\"font-family:'Poppins',sans-serif;font-weight:500;font-size:clamp(20px,3.6vw,28px);line-height:1.42;margin:0;color:var(--ink);letter-spacing:-.01em;\">{{ liner }}<\u002Fp>\n        <button sc-camel-on-click=\"{{ continueLiner }}\" style=\"margin-top:34px;padding:14px 34px;background:var(--ink);color:var(--paper,#F3F7F5);border:none;border-radius:40px;font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;cursor:pointer;\">Next banner<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ FRAMING ============ -->\n  <sc-if value=\"{{ isFraming }}\">\n    <div style=\"position:absolute;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;\">\n      <div style=\"max-width:640px;\">\n        <div style=\"font-family:'Poppins',sans-serif;font-size:12px;letter-spacing:.22em;font-weight:600;color:var(--accent,#119C8B);text-transform:uppercase;margin-bottom:22px;\">Quick confession<\u002Fdiv>\n        <p style=\"font-family:'Poppins',sans-serif;font-weight:500;font-size:clamp(20px,3.5vw,27px);line-height:1.46;margin:0;color:var(--paper,#F3F7F5);letter-spacing:-.01em;\">{{ framingText }}<\u002Fp>\n        <button sc-camel-on-click=\"{{ continueFraming }}\" style=\"margin-top:34px;padding:15px 34px;background:var(--accent,#119C8B);color:#fff;border:none;border-radius:40px;font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;cursor:pointer;\">Got it, keep going<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ RESULTS ============ -->\n  <sc-if value=\"{{ isResults }}\">\n    <div style=\"position:absolute;inset:0;background:var(--paper,#F3F7F5);overflow:auto;\">\n      <div style=\"min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 26px;text-align:center;\">\n        <div style=\"max-width:560px;width:100%;\">\n          <div style=\"font-family:'Poppins',sans-serif;font-size:12px;letter-spacing:.22em;font-weight:600;color:var(--accent,#119C8B);text-transform:uppercase;margin-bottom:16px;\">Result<\u002Fdiv>\n          <div style=\"font-family:'Poppins',sans-serif;font-weight:500;font-size:clamp(18px,3.2vw,22px);color:#5a6864;line-height:1.4;\">An honest banner takes one click to refuse.<br>The worst one you just faced took<\u002Fdiv>\n          <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(78px,19vw,140px);line-height:.9;color:var(--accent,#119C8B);letter-spacing:-.03em;margin:8px 0;\">{{ maxClicks }}<\u002Fdiv>\n          <div style=\"font-family:'Poppins',sans-serif;font-weight:500;font-size:clamp(18px,3.2vw,22px);color:#5a6864;\">clicks to say no.<\u002Fdiv>\n\n          <div style=\"margin-top:26px;padding-top:22px;border-top:1px solid #dde6e2;display:flex;flex-direction:column;gap:10px;font-size:14.5px;color:var(--ink);line-height:1.5;\">\n            <div>Across all eight tricks, saying no averaged <strong>{{ avgClicks }} clicks<\u002Fstrong>. It should always be one.<\u002Fdiv>\n            <div style=\"color:#5a6864;\">You spent <strong style=\"color:var(--ink);\">{{ totalSeconds }} seconds<\u002Fstrong> just trying to refuse.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:30px;background:var(--ink);color:var(--paper,#F3F7F5);border-radius:18px;padding:26px 24px;text-align:left;\">\n            <div style=\"font-family:'Poppins',sans-serif;font-size:11px;letter-spacing:.2em;font-weight:600;color:var(--accent,#119C8B);text-transform:uppercase;\">Your persona<\u002Fdiv>\n            <div style=\"font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(26px,5.5vw,38px);line-height:1.08;margin:8px 0 10px;letter-spacing:-.01em;\">{{ persona }}<\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.55;color:#c2d0cb;margin:0;\">{{ personaDesc }}<\u002Fp>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:22px;background:#fff;border:1px solid #dfe8e4;border-radius:14px;padding:18px;\">\n            <p style=\"font-size:15px;line-height:1.5;margin:0 0 14px;color:var(--ink);font-weight:500;\">\"The worst cookie banner I faced took {{ maxClicks }} clicks to refuse. It should take one. Can you do better?\"<\u002Fp>\n            <button sc-camel-on-click=\"{{ copyShare }}\" style=\"width:100%;padding:13px;border:1.5px solid var(--ink);background:var(--ink);color:var(--paper,#F3F7F5);border-radius:10px;font-family:'Poppins',sans-serif;font-weight:600;font-size:14px;cursor:pointer;\">\n              <sc-if value=\"{{ copied }}\">Copied to clipboard<\u002Fsc-if>\n              <sc-if value=\"{{ notCopied }}\">Copy my result<\u002Fsc-if>\n            <\u002Fbutton>\n          <\u002Fdiv>\n\n          <p style=\"font-size:13.5px;line-height:1.6;color:#7a857f;margin:26px auto 0;max-width:470px;\">{{ framingEcho }}<\u002Fp>\n\n          <button sc-camel-on-click=\"{{ restart }}\" style=\"margin-top:24px;padding:13px 30px;background:transparent;color:var(--ink);border:1.5px solid #c2cdc8;border-radius:40px;font-family:'Poppins',sans-serif;font-weight:600;font-size:14px;cursor:pointer;\">Play again<\u002Fbutton>\n\n          <div style=\"margin-top:40px;padding-top:26px;border-top:1px solid #dde6e2;\">\n            <p style=\"font-size:14.5px;line-height:1.6;color:#5a6864;margin:0 0 14px;\">Refusing should be as easy as accepting. We build consent that says no as plainly as it says yes.<\u002Fp>\n            <a href=\"https://www.cookieyes.com\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;font-family:'Poppins',sans-serif;font-size:13.5px;color:var(--accent,#119C8B);font-weight:600;text-decoration:none;border-bottom:1.5px solid var(--accent,#119C8B);padding-bottom:1px;\">Built by people who think so. CookieYes<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:780},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2563EB&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#119C8B&quot;,&quot;#0E8C9E&quot;,&quot;#2563EB&quot;,&quot;#7C3AED&quot;,&quot;#13312E&quot;]},&quot;paperColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FFFFFF&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#F3F7F5&quot;,&quot;#FFFFFF&quot;,&quot;#F5F4F1&quot;,&quot;#0E201E&quot;]}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { screen:'title', idx:0, clicks:0, totalMs:0, perBanner:[], sub:this.freshSub(), toast:'', copied:false };\n    this.fleeRef = React.createRef();\n    this.huntRef = React.createRef();\n    this.bannerStart = 0;\n    this._total = 0;\n    this._banner = 0;\n    this.PATTERNS = ['Honest banner','Muted reject','Buried reject','Confirm-shaming','Disguised reject','Fleeing reject','Fake loading bar','The interrogation'];\n    this.TIERS = ['Grounded','Grounded','Grounded','Grounded','Heightened','Absurd','Absurd','Absurd'];\n    this.FAUX = ['news','shop','blog','news','shop','blog','news','shop'];\n    this.COOKIES = [0,2,4,5,7];\n    this.LINERS = [\n      null,\n      \"Spot the difference. 'Accept' is a button. 'Reject' is practically a footnote. This is the oldest trick there is, and regulators stopped finding it cute years ago. France hit Google with a €150M fine over this exact setup.\",\n      \"Those boxes were already ticked when you got here. That's not consent, that's assumption. GDPR has been clear since day one that silence and pre-ticks don't count. The 'reject' option exists. They just made you dig for it.\",\n      \"Nothing like being guilt-tripped by a website. Real banners are rarely this honest about the manipulation, but the move is everywhere. Word the 'no' so you feel small for picking it. Consent's supposed to be freely given. Shame isn't free.\",\n      \"The glowing button is us being dramatic. Hiding 'Reject' as grey corner text while 'Accept' lights up like Christmas is not. When the design itself leans on you to pick one answer, 'freely given' goes out the window.\",\n      \"Fine, buttons don't actually run away. That one's on us. But making 'no' harder to reach than 'yes' is the whole game, played straight, on thousands of sites. The rule isn't complicated. Saying no shouldn't be a workout.\",\n      \"Nobody's ever made you wait to be allowed to refuse. We made that up for fun. What's not made up: piling friction onto the 'reject' path that mysteriously never shows up on the 'accept' path. Funny how 'yes' is always instant.\",\n      \"Okay, no. You'll never have to solve a puzzle or check with your boss to turn down cookies. We got carried away. But the trick underneath has a real name and a real reputation: wear people down with enough steps that they cave and click 'yes.' Consent you only got because someone gave up isn't consent. It's a war of attrition.\"\n    ];\n    this.framingText = \"Quick confession before this gets sillier. We're exaggerating now, on purpose, for the laugh. Real banners won't make a button flee your cursor. But every joke from here is pointing at something real sites genuinely do, and a lot of it is against the law. The cartoon's fake. The behaviour it's mocking isn't.\";\n    this.framingEcho = \"The cartoons were the exaggeration. The behaviour they were mocking is real, and a lot of it is against the law.\";\n  }\n  freshSub(){ return { prefsOpen:false, ta:true, tm:true, tp:true, fleeX:0, fleeY:0, fleeCount:0, fleeStopped:false, loading:false, prog:0, loadDone:false, step:0, capSel:[false,false,false,false,false,false,false,false,false] }; }\n  componentDidMount(){ this.applyTheme(); this._tick = setInterval(()=>{ if(this.state.screen==='playing') this.forceUpdate(); }, 100); }\n  componentDidUpdate(){ this.applyTheme(); }\n  componentWillUnmount(){ clearInterval(this._tick); clearInterval(this._load); clearTimeout(this._tt); clearTimeout(this._ct); }\n  applyTheme(){ const r=document.documentElement; if(this.props.accentColor) r.style.setProperty('--accent', this.props.accentColor); if(this.props.paperColor) r.style.setProperty('--paper', this.props.paperColor); }\n  setSub(p){ this.setState(s=>({ sub:{...s.sub, ...p} })); }\n  bump(n){ n=n||1; this._total+=n; this._banner+=n; this.setState({ clicks:this._total }); }\n  showToast(t){ this.setState({toast:t}); clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:''}),1700); }\n  start(){ clearInterval(this._load); this._total=0; this._banner=0; this.setState({ screen:'playing', idx:0, clicks:0, totalMs:0, perBanner:[], sub:this.freshSub(), toast:'', copied:false }); this.bannerStart=Date.now(); }\n  acceptTrap(){ this.bump(1); this.showToast(\"That's Accept. You're here to refuse.\"); }\n  success(){ const t=Date.now()-this.bannerStart; clearInterval(this._load); const spent=this._banner; const i=this.state.idx; this.setState(s=>({ totalMs:s.totalMs+t, perBanner:[...s.perBanner, spent] })); if(i===0){ this.goNext(); } else { this.setState({screen:'liner', toast:''}); } }\n  goNext(){ clearInterval(this._load); const next=this.state.idx+1; this._banner=0; if(next>=8){ this.setState({screen:'results', toast:''}); return; } this.setState({ idx:next, sub:this.freshSub(), screen:'playing', toast:'' }); this.bannerStart=Date.now(); }\n  continueLiner(){ if(this.state.idx===5){ this.setState({screen:'framing'}); return; } this.goNext(); }\n  continueFraming(){ this.goNext(); }\n  restart(){ clearInterval(this._load); this._total=0; this._banner=0; this.setState({ screen:'title', idx:0, clicks:0, totalMs:0, perBanner:[], sub:this.freshSub(), toast:'', copied:false }); }\n  reject(){ this.bump(1); this.success(); }\n  openPrefs(){ this.bump(1); this.setSub({prefsOpen:true}); }\n  togA(){ this.bump(1); this.setSub({ta:!this.state.sub.ta}); }\n  togM(){ this.bump(1); this.setSub({tm:!this.state.sub.tm}); }\n  togP(){ this.bump(1); this.setSub({tp:!this.state.sub.tp}); }\n  savePrefs(){ this.bump(1); this.success(); }\n  onHunt(e){ const s=this.state; if(s.screen!=='playing'||s.idx!==5||s.sub.fleeStopped) return; const el=this.fleeRef.current, cont=this.huntRef.current; if(!el||!cont) return; const r=el.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2; const dx=cx-e.clientX, dy=cy-e.clientY; const dist=Math.hypot(dx,dy); if(dist<105){ const cnt=s.sub.fleeCount+1; const ang=Math.atan2(dy,dx); const push=135; let nx=s.sub.fleeX+Math.cos(ang)*push; let ny=s.sub.fleeY+Math.sin(ang)*push; const cr=cont.getBoundingClientRect(); const maxX=cr.width/2-70, maxY=cr.height/2-90; nx=Math.max(-maxX,Math.min(maxX,nx)); ny=Math.max(-maxY,Math.min(maxY,ny)); this.setSub({ fleeX:nx, fleeY:ny, fleeCount:cnt, fleeStopped:cnt>=9 }); } }\n  startLoad(){ if(this.state.sub.loading) return; this.bump(1); this.setSub({loading:true, prog:0, loadDone:false}); this._load=setInterval(()=>{ const p=this.state.sub.prog; const inc = p<55?9 : p<85?4 : p<97?1.4 : 0.7; let np=p+inc; if(np>=100){ clearInterval(this._load); this.setSub({prog:100}); setTimeout(()=>this.setSub({loadDone:true}),500); } else { this.setSub({prog:np}); } }, 90); }\n  confirmLoad(){ this.bump(1); this.success(); }\n  q(step){ this.bump(1); this.setSub({step}); }\n  capTog(i){ this.bump(1); const c=this.state.sub.capSel.slice(); c[i]=!c[i]; this.setSub({capSel:c}); }\n  capVerify(){ this.bump(1); this.setSub({step:4}); }\n  approve(){ this.bump(1); this.success(); }\n  copyShare(){ const pb=this.state.perBanner; const mx=pb.length?Math.max.apply(null,pb):1; const txt='The worst cookie banner I faced took '+mx+' clicks to refuse. It should take one. Can you do better? (Can You Find the Reject Button?)'; try{ navigator.clipboard.writeText(txt); }catch(e){} this.setState({copied:true}); clearTimeout(this._ct); this._ct=setTimeout(()=>this.setState({copied:false}),2200); }\n\n  renderVals(){\n    const s=this.state, sub=s.sub, i=s.idx;\n    const liveMs = s.totalMs + (s.screen==='playing' ? Date.now()-this.bannerStart : 0);\n    const trackBase = 'width:42px;height:24px;border-radius:14px;position:relative;flex-shrink:0;cursor:pointer;transition:background .2s;';\n    const knobBase = 'position:absolute;top:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);';\n    const mkTog = (on,onClick,label,desc)=>({ label, desc, onClick, track: trackBase+'background:'+(on?'#22c55e':'#cbd5e1')+';', knob: knobBase+'left:'+(on?'20px':'2px')+';' });\n    const toggles = [\n      mkTog(sub.ta, ()=>this.togA(), 'Analytics & performance', 'Helps us understand site usage'),\n      mkTog(sub.tm, ()=>this.togM(), 'Marketing & advertising', 'Personalised ads from 312 partners'),\n      mkTog(sub.tp, ()=>this.togP(), 'Personalisation', 'Remembers your preferences')\n    ];\n    const capTiles = sub.capSel.map((sel,k)=>({ sel, cookie:this.COOKIES.includes(k), onClick:()=>this.capTog(k), style:'aspect-ratio:1;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:'+(sel?'#dbeafe':'#f1f1f1')+';border:2px solid '+(sel?'#2563eb':'transparent')+';box-sizing:border-box;' }));\n    const scl = Math.max(0.62, 1 - sub.fleeCount*0.045);\n    const fleeStyle = { position:'absolute', left:'50%', top:'50%', transform:'translate(calc(-50% + '+sub.fleeX+'px), calc(-50% + '+sub.fleeY+'px)) scale('+scl+')', transition:'transform .12s ease-out' };\n    const loadBarStyle = { width:Math.floor(sub.prog)+'%', height:'100%', background:'#4f46e5', borderRadius:'6px', transition:'width .15s linear', backgroundImage:'repeating-linear-gradient(45deg,rgba(255,255,255,.25) 0 7px,transparent 7px 14px)', backgroundSize:'28px 28px', animation:'barShimmer .6s linear infinite' };\n    const pb=s.perBanner;\n    const maxClicks = pb.length?Math.max.apply(null,pb):1;\n    const avgClicks = pb.length?Math.max(1,Math.round(pb.reduce((a,b)=>a+b,0)/pb.length)):1;\n    const c = s.clicks;\n    let persona, personaDesc;\n    if(c<=18){ persona='Consent Escape Artist'; personaDesc='You went after every reject button like you had a personal grudge. The dark patterns barely slowed you down.'; }\n    else if(c<=28){ persona='Survived the Gauntlet'; personaDesc='Click-weary and a little annoyed, but you got through without once caving and accepting. Respect.'; }\n    else { persona='Reluctant Accepter'; personaDesc='It took some doing, which is exactly what the banners were counting on. Picture all that effort replaced by one honest click.'; }\n\n    return {\n      isTitle:s.screen==='title', isPlaying:s.screen==='playing', isLiner:s.screen==='liner', isFraming:s.screen==='framing', isResults:s.screen==='results',\n      n:i+1, patternName:this.PATTERNS[i], tier:this.TIERS[i],\n      fauxNews:this.FAUX[i]==='news', fauxShop:this.FAUX[i]==='shop', fauxBlog:this.FAUX[i]==='blog',\n      timeStr:(liveMs/1000).toFixed(1), bannerClicks:this._banner, toast:s.toast,\n      b1:i===0, b2:i===1, b3:i===2, b4:i===3, b5:i===4, b6:i===5, b7:i===6, b8:i===7,\n      prefsOpen:sub.prefsOpen, notPrefs:!sub.prefsOpen, toggles,\n      fleeStyle, fleeStopped:sub.fleeStopped, huntRef
